# Notes: this receipt is based on torchvision-feedstock:
# https://github.com/conda-forge/torchvision-feedstock/blob/master/recipe/meta.yaml

{% set version = "2.6" %}
# see github.com/conda-forge/conda-forge.github.io/issues/1059 for naming discussion
{% set torch_proc_type = "cuda" if cuda_compiler_version != "None" else "cpu" %}

{% if cuda_compiler_version in (None, "None", True, False) %}
{% set cuda_major = 0 %}
{% else %}
{% set cuda_major = environ.get("cuda_compiler_version", "11.8").split(".")[0] | int %}
{% endif %}

package:
  name: torchani
  version: {{ version }}

source:
  url: https://github.com/aiqm/torchani/archive/refs/tags/{{ version }}.tar.gz
  sha256: cbafc8fc5ca77c8318daafa4c75958b279a64d82c016961d083406009e9b0720
  patches:
    - patches/0001-make-download-robust.patch

build:
  number: 0
  skip: true  # [win]
  string: cuda{{ cuda_compiler_version | replace('.', '') }}py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}  # [cuda_compiler_version != "None"]
  string: cpu_py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}  # [cuda_compiler_version == "None"]
  script_env:
    - SETUPTOOLS_SCM_PRETEND_VERSION={{ version }}
  script:
    # The torchani setup.py does not look in the conda folder for includes.
    # I added this so that nvcc finds $PREFIX/include/crypt.h
    - export CPATH={{ PREFIX }}/include
    - {{ PYTHON }} -m pip install . -vvv --no-deps --config-settings=--global-option=ext-all-sms    # [cuda_compiler_version != "None"]
    - {{ PYTHON }} -m pip install . -vvv --no-deps                                                  # [cuda_compiler_version == "None"]
    - mkdir -p ${SP_DIR}/torchani/resources
    - cp -R ./torchani/resources/* ${SP_DIR}/torchani/resources
    - cp ./torchani/datasets/builtin_datasets.json ${SP_DIR}/torchani/datasets/builtin_datasets.json
    - cp ./torchani/datasets/md5s.csv ${SP_DIR}/torchani/datasets/md5s.csv

requirements:
  build:
    - {{ stdlib("c") }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('cuda') }}              # [cuda_compiler_version != "None"]
    - cross-python_{{ target_platform }}  # [build_platform != target_platform]
    - python                              # [build_platform != target_platform]
    - cython                              # [build_platform != target_platform]
    - cuda-version =={{ cuda_compiler_version }}  # [cuda_compiler_version not in (undefined, 'None')]
    - setuptools_scm
  host:
    - python
    - pip
    - setuptools
    - setuptools_scm
    - importlib-metadata
    - pytorch
    - pytorch * {{ torch_proc_type }}*
    - cuda-version =={{ cuda_compiler_version }}    # [cuda_compiler_version != "None"] 
    - cuda-cudart-dev                               # [cuda_compiler_version != "None"]
  run:
    - python
    - pip
    - setuptools
    - setuptools_scm
    - ase
    - h5py
    - huggingface_hub
    - numpy
    - pandas
    - pyarrow
    - requests
    - rich
    - tqdm
    - typer
    - typing_extensions >=4.0
    - zarr <3
  run_constrained:
    # additional run constraint to the one from the (version-only) run_export;
    # constraining the CPU builds to CPU pytorch isn't 100% necessary, but cleaner
    - pytorch * {{ torch_proc_type }}*

test:
  imports:
    - torchani
    - torchani.cuaev                     # [cuda_compiler_version != "None"]
  source_files:
    - tests/*
    - tools/*
    - download.sh
    - dataset/*
  requires:
    - wget
    - unzip
    - tensorboard
    - parameterized
    - pillow
    - pyyaml
    - pytest
    - expecttest
    - pkbar
  commands:
    # download testing datasets
    - ./download.sh                                                           # [unix]
    # broken symlink that got ignored when copying
    - ln -s ../download/dataset/ani-1x/ dataset/ani-1x                        # [unix]
    - ln -s ../download/dataset/ani1-up_to_gdb4/ dataset/ani1-up_to_gdb4      # [unix]
    - cd tests; python -m pytest -v -s *.py  # [unix]

about:
  home: https://github.com/aiqm/torchani
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'Accurate Neural Network Potential on PyTorch'

extra:
  recipe-maintainers:
    - yueyericardo
    - mikemhenry
